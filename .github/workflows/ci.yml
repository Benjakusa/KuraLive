name: KuraLive CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: uchaguzi360_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
        
    - name: Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install ruff pytest pytest-cov bandit
        
    - name: Lint with Ruff
      working-directory: ./backend
      run: ruff check .

    - name: Security scan with Bandit
      working-directory: ./backend
      run: bandit -r . -ll -c pyproject.toml || echo "Running without strict fail for now"
        
    - name: Run Pytest
      working-directory: ./backend
      env:
        DATABASE_URL_DIRECT: postgresql://postgres:postgres@localhost:5432/uchaguzi360_test
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/uchaguzi360_test
        REDIS_URL: redis://localhost:6379/0
      run: |
        # Initialize DB schema
        psql $DATABASE_URL_DIRECT -f schema.sql
        psql $DATABASE_URL_DIRECT -f migration_modules.sql
        psql $DATABASE_URL_DIRECT -f migration_production.sql
        
        pytest --cov=. --cov-report=xml
        
    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        file: ./backend/coverage.xml
