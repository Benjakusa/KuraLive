apiVersion: apps/v1
kind: Deployment
metadata:
  name: kuralive-frontend
  labels:
    app: kuralive
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kuralive
      tier: frontend
  template:
    metadata:
      labels:
        app: kuralive
        tier: frontend
    spec:
      containers:
      - name: nginx
        image: kuralive-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: kuralive-frontend-svc
spec:
  type: LoadBalancer
  selector:
    app: kuralive
    tier: frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
