apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
  labels:
    app: kuralive
    tier: database-pool
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kuralive
      tier: database-pool
  template:
    metadata:
      labels:
        app: kuralive
        tier: database-pool
    spec:
      containers:
      - name: pgbouncer
        image: edoburu/pgbouncer:1.21.0
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: kuralive-secrets
              key: DATABASE_URL_DIRECT
        - name: MAX_CLIENT_CONN
          value: "5000"
        - name: DEFAULT_POOL_SIZE
          value: "100"
        - name: POOL_MODE
          value: "transaction"
        ports:
        - containerPort: 6432
---
apiVersion: v1
kind: Service
metadata:
  name: pgbouncer
spec:
  type: ClusterIP
  ports:
  - port: 6432
    targetPort: 6432
  selector:
    app: kuralive
    tier: database-pool
